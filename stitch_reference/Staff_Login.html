<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Staff Login - Jera Restaurant</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#000000",
                        "background-light": "#ffffff",
                        "background-dark": "#191919",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Noto Serif', serif;
        }
        .sharp-input {
            border-radius: 0px !important;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-primary/10 px-6 py-4 md:px-12 lg:px-20">
<div class="flex items-center gap-3">
<div class="text-primary dark:text-white">
<span class="material-symbols-outlined text-3xl">restaurant</span>
</div>
<h2 class="text-xl font-bold tracking-tighter uppercase">Jera Restaurant</h2>
</div>
<div class="hidden md:block">
<span class="text-xs uppercase tracking-widest opacity-50">Internal Access Only</span>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="w-full max-w-md">
<!-- Login Title -->
<div class="text-center mb-10">
<h1 class="text-4xl md:text-5xl font-bold tracking-tight mb-2">Staff Login</h1>
<div class="h-1 w-12 bg-primary mx-auto"></div>
</div>
<!-- Login Form Card -->
<div class="border border-primary p-8 md:p-12 bg-white dark:bg-zinc-900 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
<form action="#" class="space-y-6" method="POST">
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold" for="username">Username</label>
<input class="w-full border-primary border-2 p-4 focus:ring-0 focus:border-primary bg-transparent text-lg sharp-input placeholder:opacity-30" id="username" name="username" placeholder="Enter username" required="" type="text"/>
</div>
<div class="space-y-2">
<label class="text-xs uppercase tracking-widest font-bold" for="password">Password</label>
<input class="w-full border-primary border-2 p-4 focus:ring-0 focus:border-primary bg-transparent text-lg sharp-input placeholder:opacity-30" id="password" name="password" placeholder="Enter password" required="" type="password"/>
</div>
<div class="pt-4">
<button class="w-full bg-primary text-white py-5 text-lg font-bold uppercase tracking-widest hover:bg-zinc-800 transition-colors flex items-center justify-center gap-2" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-sm">login</span>
</button>
</div>
</form>
<!-- Role Hints -->
<div class="mt-12 pt-8 border-t border-dotted border-primary/30">
<p class="text-[10px] uppercase tracking-widest font-bold mb-4 opacity-60 text-center">System Roles Reference</p>
<div class="grid grid-cols-1 gap-2">
<div class="flex justify-between text-xs border-b border-primary/5 pb-1">
<span class="font-bold">ADMINISTRATOR</span>
<span class="opacity-60 italic">admin / admin</span>
</div>
<div class="flex justify-between text-xs border-b border-primary/5 pb-1">
<span class="font-bold">CASHIER</span>
<span class="opacity-60 italic">cashier / cashier</span>
</div>
<div class="flex justify-between text-xs border-b border-primary/5 pb-1">
<span class="font-bold">KITCHEN</span>
<span class="opacity-60 italic">kitchen / kitchen</span>
</div>
</div>
</div>
</div>
<!-- Back to Site Link -->
<div class="mt-8 text-center">
<a class="text-xs uppercase tracking-widest hover:underline opacity-50 flex items-center justify-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                    Return to Public Website
                </a>
</div>
</div>
</main>
<!-- Footer -->
<footer class="py-8 px-6 text-center border-t border-primary/5">
<p class="text-[10px] uppercase tracking-[0.2em] opacity-40">
            © 2024 Jera Restaurant Group. All Rights Reserved. Private Management Terminal.
        </p>
</footer>
</body></html>
